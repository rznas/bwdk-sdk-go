name: Publish Go SDK

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Verify build
        run: go build ./...

      - name: Run tests
        run: go test ./...

      # Go modules are fetched directly from the Git tag — no upload step needed.
      # Creating a GitHub Release makes the tag visible to `go get`.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
