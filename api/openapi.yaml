      - description: کدام فیلد باید هنگام مرتب‌سازی نتایج استفاده شود.
        explode: true
        in: query
        name: ordering
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: payment_types
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: provinces
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: reference_code
        required: false
        schema:
          type: string
        style: form
      - description: یک عبارت جستجو.
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: shipping_types
        required: false
