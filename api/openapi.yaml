              $ref: "#/components/schemas/UpdateOrderStatus"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatus"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatus"
        required: true
      responses:
        "200":
          content:
