        * `DigiExpress shipment is not in reviveable in this state` - مرسوله دیجی‌اکسپرس در این وضعیت قابل ارسال مجدد نیست.
        * `Failed to revive shipment in third party service.` - Failed to revive shipment in third party service.
        * `Selected shipping method is not eligible for revival.` - Selected shipping method is not eligible for revival.
